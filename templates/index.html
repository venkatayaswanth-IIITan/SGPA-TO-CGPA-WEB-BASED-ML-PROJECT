<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator | Smart Grade Tracker</title>
    <meta name="description" content="Calculate your CGPA by selecting number of semesters and entering GPA for each.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== THEMES ===== */
        :root {
            --bg-from:#0f0c29; --bg-via:#302b63; --bg-to:#24243e;
            --card-bg:rgba(255,255,255,0.07); --card-border:rgba(255,255,255,0.15);
            --card-shadow:0 25px 60px rgba(0,0,0,0.5);
            --text-primary:#fff; --text-secondary:rgba(255,255,255,0.65);
            --accent-from:#a855f7; --accent-to:#6366f1;
            --input-bg:rgba(255,255,255,0.08); --input-border:rgba(255,255,255,0.2);
            --input-focus:#a855f7;
            --label-color:rgba(255,255,255,0.8);
            --btn-from:#a855f7; --btn-to:#6366f1; --btn-shadow:rgba(168,85,247,0.45);
            --select-bg:rgba(255,255,255,0.1);
            --badge-bg:rgba(168,85,247,0.2); --badge-border:rgba(168,85,247,0.5);
        }
        [data-theme="ocean"] {
            --bg-from:#0a2342; --bg-via:#126872; --bg-to:#0d4f5c;
            --card-bg:rgba(255,255,255,0.08); --card-border:rgba(0,220,255,0.2);
            --text-primary:#e0f7fa; --text-secondary:rgba(224,247,250,0.65);
            --accent-from:#00e5ff; --accent-to:#0288d1;
            --input-bg:rgba(0,229,255,0.07); --input-border:rgba(0,229,255,0.25); --input-focus:#00e5ff;
            --label-color:rgba(224,247,250,0.85);
            --btn-from:#00bcd4; --btn-to:#0288d1; --btn-shadow:rgba(0,188,212,0.45);
            --select-bg:rgba(0,229,255,0.1);
            --badge-bg:rgba(0,229,255,0.15); --badge-border:rgba(0,229,255,0.4);
        }
        [data-theme="sunset"] {
            --bg-from:#1a0533; --bg-via:#6b1a2a; --bg-to:#c0392b;
            --card-bg:rgba(255,255,255,0.08); --card-border:rgba(255,150,80,0.25);
            --text-primary:#fff3e0; --text-secondary:rgba(255,243,224,0.65);
            --accent-from:#ff9800; --accent-to:#f44336;
            --input-bg:rgba(255,152,0,0.08); --input-border:rgba(255,152,0,0.3); --input-focus:#ff9800;
            --label-color:rgba(255,243,224,0.85);
            --btn-from:#ff9800; --btn-to:#f44336; --btn-shadow:rgba(255,152,0,0.45);
            --select-bg:rgba(255,152,0,0.1);
            --badge-bg:rgba(255,152,0,0.15); --badge-border:rgba(255,152,0,0.45);
        }
        [data-theme="forest"] {
            --bg-from:#0b1d11; --bg-via:#1b4332; --bg-to:#2d6a4f;
            --card-bg:rgba(255,255,255,0.07); --card-border:rgba(100,255,150,0.2);
            --text-primary:#d8f3dc; --text-secondary:rgba(216,243,220,0.65);
            --accent-from:#52b788; --accent-to:#1b4332;
            --input-bg:rgba(82,183,136,0.08); --input-border:rgba(82,183,136,0.25); --input-focus:#52b788;
            --label-color:rgba(216,243,220,0.85);
            --btn-from:#52b788; --btn-to:#2d6a4f; --btn-shadow:rgba(82,183,136,0.45);
            --select-bg:rgba(82,183,136,0.1);
            --badge-bg:rgba(82,183,136,0.15); --badge-border:rgba(82,183,136,0.4);
        }

        /* ===== RESET ===== */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

        body {
            font-family:'Outfit',sans-serif;
            min-height:100vh;
            background:linear-gradient(135deg,var(--bg-from),var(--bg-via),var(--bg-to));
            background-size:400% 400%;
            animation:gradientShift 10s ease infinite;
            display:flex;align-items:center;justify-content:center;
            position:relative;overflow-x:hidden;
            padding:80px 0 40px;
        }
        @keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

        /* ORBS */
        .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.22;animation:orbFloat 12s ease-in-out infinite;pointer-events:none;}
        .orb-1{width:350px;height:350px;background:var(--accent-from);top:-80px;left:-80px;}
        .orb-2{width:280px;height:280px;background:var(--accent-to);bottom:-60px;right:-60px;animation-delay:4s;}
        .orb-3{width:200px;height:200px;background:var(--btn-from);top:40%;left:60%;animation-delay:7s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(18px,-18px) scale(1.07);}}

        /* PARTICLES */
        .particle{position:fixed;width:3px;height:3px;background:var(--accent-from);border-radius:50%;opacity:0;animation:particleRise 6s ease-in infinite;pointer-events:none;}
        @keyframes particleRise{0%{opacity:0;transform:translateY(0) scale(0);}20%{opacity:.7;}100%{opacity:0;transform:translateY(-100vh) scale(1.5);}}

        /* THEME BAR */
        .theme-bar{
            position:fixed;top:20px;right:20px;display:flex;gap:10px;z-index:100;
            background:rgba(0,0,0,.3);backdrop-filter:blur(12px);padding:8px 12px;
            border-radius:50px;border:1px solid rgba(255,255,255,.1);
        }
        .theme-label{color:rgba(255,255,255,.5);font-size:11px;font-weight:500;display:flex;align-items:center;margin-right:4px;}
        .theme-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.2);transition:transform .25s,border-color .25s,box-shadow .25s;}
        .theme-dot:hover{transform:scale(1.2);}
        .theme-dot.active{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.6);transform:scale(1.25);}
        .theme-dot[data-t="cosmic"]{background:linear-gradient(135deg,#a855f7,#6366f1);}
        .theme-dot[data-t="ocean"] {background:linear-gradient(135deg,#00e5ff,#0288d1);}
        .theme-dot[data-t="sunset"]{background:linear-gradient(135deg,#ff9800,#f44336);}
        .theme-dot[data-t="forest"]{background:linear-gradient(135deg,#52b788,#1b4332);}

        /* WRAPPER & CARD */
        .wrapper{position:relative;z-index:10;width:100%;max-width:520px;padding:16px;}
        .card{
            background:var(--card-bg);border:1px solid var(--card-border);
            border-radius:24px;padding:44px 40px 40px;
            box-shadow:var(--card-shadow);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
            animation:cardIn .7s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

        /* HEADER */
        .header{text-align:center;margin-bottom:32px;}
        .icon-ring{
            width:72px;height:72px;margin:0 auto 16px;border-radius:50%;
            background:linear-gradient(135deg,var(--accent-from),var(--accent-to));
            display:flex;align-items:center;justify-content:center;font-size:30px;
            box-shadow:0 8px 30px var(--btn-shadow);
            animation:iconPulse 2.5s ease-in-out infinite;
        }
        @keyframes iconPulse{0%,100%{box-shadow:0 8px 30px var(--btn-shadow);}50%{box-shadow:0 8px 50px var(--btn-shadow),0 0 0 12px rgba(168,85,247,.06);}}
        .card h1{font-size:1.85rem;font-weight:800;color:var(--text-primary);letter-spacing:-.5px;}
        .subtitle{margin-top:6px;font-size:.88rem;color:var(--text-secondary);}
        .badge{
            display:inline-flex;align-items:center;gap:5px;margin-top:12px;
            padding:4px 14px;border-radius:50px;font-size:11px;font-weight:600;
            letter-spacing:.5px;color:var(--text-primary);
            background:var(--badge-bg);border:1px solid var(--badge-border);
        }

        /* SECTION LABEL */
        .section-label{
            display:flex;align-items:center;gap:8px;
            font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
            color:var(--text-secondary);margin-bottom:10px;
        }
        .section-label::after{content:'';flex:1;height:1px;background:var(--card-border);}

        /* SEMESTER SELECT */
        .select-wrap{position:relative;margin-bottom:28px;}
        .select-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
        .select-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-secondary);font-size:12px;}

        select#num_sems {
            width:100%;padding:14px 40px 14px 46px;
            background:var(--select-bg);
            border:1.5px solid var(--input-border);
            border-radius:14px;
            color:var(--text-primary);
            font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;
            outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;
            transition:border-color .25s,box-shadow .25s;
        }
        select#num_sems:focus{border-color:var(--input-focus);box-shadow:0 0 0 4px rgba(168,85,247,.15);}
        select#num_sems option{background:#1e1e2e;color:#fff;}

        /* GPA GRID */
        #semFields{
            display:grid;grid-template-columns:1fr 1fr;gap:14px;
            margin-bottom:0;
            max-height:0;overflow:hidden;
            transition:max-height .5s cubic-bezier(.4,0,.2,1),opacity .4s ease;
            opacity:0;
        }
        #semFields.visible{max-height:600px;opacity:1;}

        .field{animation:fieldIn .35s cubic-bezier(.34,1.56,.64,1) both;}
        @keyframes fieldIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

        .field label{
            display:flex;align-items:center;gap:6px;
            font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
            color:var(--label-color);margin-bottom:7px;
        }
        .field label .dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--accent-from),var(--accent-to));flex-shrink:0;}

        .input-wrap{position:relative;}
        .input-wrap .iicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}

        input[type="number"]{
            width:100%;padding:11px 12px 11px 36px;
            background:var(--input-bg);border:1.5px solid var(--input-border);
            border-radius:12px;color:var(--text-primary);
            font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:500;
            outline:none;transition:border-color .25s,box-shadow .25s,background .25s;
            -moz-appearance:textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;}
        input[type="number"]::placeholder{color:var(--text-secondary);font-weight:400;}
        input[type="number"]:focus{border-color:var(--input-focus);background:rgba(255,255,255,.12);box-shadow:0 0 0 4px rgba(168,85,247,.15);}

        /* DIVIDER */
        .divider{height:1px;background:linear-gradient(90deg,transparent,var(--card-border),transparent);margin:26px 0;}

        /* HINT */
        .hint{
            display:flex;align-items:center;gap:8px;
            background:var(--badge-bg);border:1px solid var(--badge-border);
            border-radius:12px;padding:10px 14px;margin-bottom:22px;
            font-size:.8rem;color:var(--text-secondary);
            opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s;
        }
        .hint.show{opacity:1;transform:translateY(0);}

        /* BUTTON */
        #submitWrap{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s,opacity .4s;}
        #submitWrap.show{max-height:80px;opacity:1;}

        .btn{
            width:100%;padding:15px;
            background:linear-gradient(135deg,var(--btn-from),var(--btn-to));
            color:#fff;border:none;border-radius:14px;
            font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.5px;
            cursor:pointer;position:relative;overflow:hidden;
            transition:transform .2s,box-shadow .2s;
            box-shadow:0 6px 25px var(--btn-shadow);
        }
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 35px var(--btn-shadow);}
        .btn:active{transform:translateY(0);}
        .btn-inner{display:flex;align-items:center;justify-content:center;gap:8px;}

        .btn-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:ripple .6s linear;pointer-events:none;}
        @keyframes ripple{to{transform:scale(4);opacity:0;}}

        /* FOOTER */
        .card-footer{text-align:center;margin-top:22px;font-size:.78rem;color:var(--text-secondary);}

        /* RESPONSIVE */
        @media(max-width:520px){
            .card{padding:32px 22px;}
            #semFields{grid-template-columns:1fr;}
            .card h1{font-size:1.5rem;}
            .theme-bar{top:12px;right:12px;padding:6px 10px;gap:7px;}
        }
    </style>
</head>
<body>

    <!-- Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Particles -->
    <div id="particles"></div>

    <!-- Theme Switcher -->
    <div class="theme-bar" role="toolbar" aria-label="Theme switcher">
        <span class="theme-label">🎨</span>
        <div class="theme-dot active" data-t="cosmic"  title="Cosmic Purple" tabindex="0" role="button" aria-label="Cosmic theme"></div>
        <div class="theme-dot"        data-t="ocean"   title="Ocean Blue"    tabindex="0" role="button" aria-label="Ocean theme"></div>
        <div class="theme-dot"        data-t="sunset"  title="Sunset Glow"   tabindex="0" role="button" aria-label="Sunset theme"></div>
        <div class="theme-dot"        data-t="forest"  title="Forest Green"  tabindex="0" role="button" aria-label="Forest theme"></div>
    </div>

    <!-- Card -->
    <div class="wrapper">
        <div class="card">

            <!-- Header -->
            <div class="header">
                <div class="icon-ring" aria-hidden="true">🎓</div>
                <h1>CGPA Calculator</h1>
                <p class="subtitle">Select semesters &amp; enter your GPA to get your CGPA instantly</p>
                <div class="badge">✦ Up to 8 Semesters ✦ 10-Point Scale</div>
            </div>

            <form action="/calculate" method="POST" id="cgpaForm" novalidate>
                <!-- Step 1: Semester Selector -->
                <div class="section-label">Step 1 — Choose Semesters</div>
                <div class="select-wrap">
                    <span class="select-icon">📅</span>
                    <select id="num_sems" name="num_sems" required aria-label="Number of semesters">
                        <option value="" disabled selected>— Select number of semesters —</option>
                        <option value="1">1 Semester</option>
                        <option value="2">2 Semesters</option>
                        <option value="3">3 Semesters</option>
                        <option value="4">4 Semesters</option>
                        <option value="5">5 Semesters</option>
                        <option value="6">6 Semesters</option>
                        <option value="7">7 Semesters</option>
                        <option value="8">8 Semesters</option>
                    </select>
                    <span class="select-arrow">▼</span>
                </div>

                <!-- Step 2: GPA Fields (dynamically shown) -->
                <div class="section-label" id="step2Label" style="display:none;">Step 2 — Enter Semester GPA</div>
                <div id="semFields"></div>

                <!-- Hint -->
                <div class="hint" id="hint">
                    <span>💡</span>
                    <span>Enter GPA between <strong>0.0 – 10.0</strong> for each semester (e.g. 8.5)</span>
                </div>

                <div class="divider" id="formDivider" style="display:none;"></div>

                <!-- Submit -->
                <div id="submitWrap">
                    <button type="submit" class="btn" id="calcBtn">
                        <div class="btn-inner">
                            <span>⚡</span>
                            <span>Calculate My CGPA</span>
                        </div>
                    </button>
                </div>
            </form>

            <p class="card-footer">Your CGPA is calculated on a 10-point scale 📊</p>
        </div>
    </div>

    <script>
        // ===== THEME =====
        const html = document.documentElement;
        const dots = document.querySelectorAll('.theme-dot');

        function setTheme(t) {
            t === 'cosmic' ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', t);
            dots.forEach(d => d.classList.toggle('active', d.dataset.t === t));
            localStorage.setItem('cgpa-theme', t);
        }

        const saved = localStorage.getItem('cgpa-theme') || 'cosmic';
        setTheme(saved);
        dots.forEach(dot => {
            dot.addEventListener('click', () => setTheme(dot.dataset.t));
            dot.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') setTheme(dot.dataset.t); });
        });

        // ===== SEMESTER SELECTOR =====
        const semIcons = ['🌱','🌿','📘','📗','📙','📕','🎯','🏁'];

        document.getElementById('num_sems').addEventListener('change', function () {
            const n = parseInt(this.value);
            const container = document.getElementById('semFields');
            const step2Label = document.getElementById('step2Label');
            const hint       = document.getElementById('hint');
            const submitWrap = document.getElementById('submitWrap');
            const divider    = document.getElementById('formDivider');

            // Clear previous fields
            container.innerHTML = '';

            if (!n || n < 1) {
                container.classList.remove('visible');
                step2Label.style.display = 'none';
                hint.classList.remove('show');
                submitWrap.classList.remove('show');
                divider.style.display = 'none';
                return;
            }

            // Build GPA input fields
            for (let i = 1; i <= n; i++) {
                const field = document.createElement('div');
                field.className = 'field';
                field.style.animationDelay = `${(i - 1) * 0.06}s`;
                field.innerHTML = `
                    <label for="sem${i}">
                        <span class="dot"></span>
                        Semester ${i}
                    </label>
                    <div class="input-wrap">
                        <span class="iicon">${semIcons[i-1] || '📋'}</span>
                        <input type="number" id="sem${i}" name="sem${i}"
                               min="0" max="10" step="0.01"
                               placeholder="e.g. 8.5" required
                               aria-label="Semester ${i} GPA">
                    </div>
                `;
                container.appendChild(field);
            }

            // Show elements
            step2Label.style.display = 'flex';
            container.classList.add('visible');
            divider.style.display = 'block';

            setTimeout(() => {
                hint.classList.add('show');
                submitWrap.classList.add('show');
            }, 200);
        });

        // ===== RIPPLE =====
        document.getElementById('calcBtn').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const r = document.createElement('span');
            r.className = 'btn-ripple';
            const size = Math.max(rect.width, rect.height);
            r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;`;
            this.appendChild(r);
            setTimeout(() => r.remove(), 650);
        });

        // ===== PARTICLES =====
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
                left:${Math.random() * 100}vw;
                bottom:${Math.random() * 20}vh;
                animation-delay:${Math.random() * 6}s;
                animation-duration:${5 + Math.random() * 5}s;
                width:${2 + Math.random() * 3}px;
                height:${2 + Math.random() * 3}px;
            `;
            pContainer.appendChild(p);
        }
    </script>
</body>
</html>
